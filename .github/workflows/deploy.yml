name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE: squado-api
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/936751823867/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'github-deploy@squado-493016.iam.gserviceaccount.com'

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          source: .
          env_vars: |
            FRONTEND_URL=https://squado.com.br,https://www.squado.com.br,https://squado-493016.web.app,https://squado-493016.firebaseapp.com
            NODE_ENV=production
            PGSSLMODE=disable
            ADMIN_EMAILS=renanresp@gmail.com
          secrets: |
            DATABASE_URL=database-url:latest
            JWT_SECRET=jwt-secret:latest
